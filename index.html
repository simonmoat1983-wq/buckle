<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyberpunk Explosion Poem</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #020617, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  #poem {
    position: relative;
    text-align: center;
    font-size: 2.2rem;
    color: #22d3ee;
    text-shadow:
      0 0 10px #22d3ee,
      0 0 20px #22d3ee,
      0 0 40px #0ea5e9,
      0 0 80px #0ea5e9;
  }

  .line {
    position: absolute;
    width: 100%;
    opacity: 0;
    transform: scale(0.2);
  }

  .explode {
    animation: explodeIn 0.4s ease-out forwards,
               flicker 0.15s infinite alternate;
  }

  .fadeOut {
    animation: fadeOut 0.6s ease-in forwards;
  }

  @keyframes explodeIn {
    0% {
      opacity: 0;
      transform: scale(0.2);
      letter-spacing: 20px;
      filter: blur(10px);
    }
    60% {
      opacity: 1;
      transform: scale(1.2);
      letter-spacing: 5px;
      filter: blur(0);
    }
    100% {
      transform: scale(1);
      letter-spacing: 2px;
    }
  }

  @keyframes fadeOut {
    0% { opacity: 1; }
    100% {
      opacity: 0;
      transform: scale(1.5);
      filter: blur(8px);
    }
  }

  @keyframes flicker {
    0% { opacity: 1; }
    100% { opacity: 0.85; }
  }
</style>
</head>

<body>

<div id="poem"></div>

<script>
  const lines = [
    "1 - 2 buckles on my shoe",
    "better watch out or ill roundhouse you",
    "3-4 I dont need anymore",
    "2 buckles are enough to put you on the floor"
  ];

  const container = document.getElementById("poem");

  function showLine(index) {
    if (index >= lines.length) return;

    const div = document.createElement("div");
    div.classList.add("line");
    div.textContent = lines[index];
    container.appendChild(div);

    // trigger explosion
    setTimeout(() => {
      div.classList.add("explode");
    }, 50);

    // fade out before next line
    setTimeout(() => {
      div.classList.remove("explode");
      div.classList.add("fadeOut");
    }, 1400);

    // remove and go next
    setTimeout(() => {
      container.removeChild(div);
      showLine(index + 1);
    }, 2000);
  }

  showLine(0);
</script>

</body>
</html>
