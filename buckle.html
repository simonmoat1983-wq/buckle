<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyberpunk Poem</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #0f172a, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    #poem {
      text-align: center;
      font-size: 2rem;
      line-height: 3rem;
    }

    .line {
      opacity: 0;
      color: #22d3ee;
      text-shadow:
        0 0 5px #22d3ee,
        0 0 10px #22d3ee,
        0 0 20px #0ea5e9,
        0 0 40px #0ea5e9;
      transition: opacity 0.5s ease-in-out;
    }

    .visible {
      opacity: 1;
      animation: flicker 0.2s infinite alternate;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      100% { opacity: 0.8; }
    }

    /* subtle glitch effect */
    .visible::after {
      content: attr(data-text);
      position: absolute;
      left: 2px;
      top: 0;
      color: #f0abfc;
      opacity: 0.5;
      clip-path: inset(0 0 50% 0);
      animation: glitch 0.3s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, 2px); }
      80% { transform: translate(1px, -2px); }
      100% { transform: translate(0, 0); }
    }
  </style>
</head>

<body>

<div id="poem"></div>

<script>
  const lines = [
    "1 - 2 buckles on my shoe",
    "better watch out or ill roundhouse you",
    "3 - 4 I dont anymore",
    "2 buckles are enough to put you on the floor"
  ];

  const container = document.getElementById("poem");

  lines.forEach((line, index) => {
    const div = document.createElement("div");
    div.classList.add("line");
    div.textContent = line;
    div.setAttribute("data-text", line);
    container.appendChild(div);

    setTimeout(() => {
      div.classList.add("visible");
    }, index * 2000);
  });
</script>

</body>
</html>
